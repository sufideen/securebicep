<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="1000" height="660" fill="#ffffff"/>

  <!-- Hub -->
  <rect x="290" y="20" width="420" height="300" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="45" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">rg-securebicep-hub</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#1e3a8a">vnet-hub  10.0.0.0/16</text>

  <rect x="310" y="80" width="180" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#1e3a8a">AzureFirewallSubnet</text>
  <text x="400" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Azure Firewall (afw)</text>

  <rect x="310" y="138" width="180" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="156" text-anchor="middle" font-size="11" fill="#1e3a8a">AzureBastionSubnet</text>
  <text x="400" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Azure Bastion</text>

  <rect x="310" y="196" width="180" height="34" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="217" text-anchor="middle" font-size="12" fill="#1e3a8a">snet-shared</text>

  <rect x="510" y="80" width="180" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="600" y="105" text-anchor="middle" font-size="11" fill="#1e3a8a">Log Analytics</text>
  <text x="600" y="122" text-anchor="middle" font-size="11" fill="#1e3a8a">(centralized)</text>
  <text x="600" y="150" text-anchor="middle" font-size="11" fill="#1e3a8a">privatelink.blob</text>
  <text x="600" y="167" text-anchor="middle" font-size="11" fill="#1e3a8a">.core.windows.net</text>
  <text x="600" y="184" text-anchor="middle" font-size="11" fill="#1e3a8a">DNS zone</text>

  <text x="500" y="255" text-anchor="middle" font-size="11" fill="#1e3a8a">Shared services only - the hub has no application workloads.</text>
  <text x="500" y="272" text-anchor="middle" font-size="11" fill="#1e3a8a">Every spoke peers here; spokes never peer to each other.</text>
  <text x="500" y="295" text-anchor="middle" font-size="10" font-style="italic" fill="#3b82f6">bicep/hub/main.bicep</text>

  <!-- Peering arrows -->
  <line x1="440" y1="320" x2="270" y2="400" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="400" x2="440" y2="320" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="320" x2="730" y2="400" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="400" x2="560" y2="320" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="365" text-anchor="middle" font-size="10" fill="#374151">peered</text>
  <text x="270" y="378" text-anchor="middle" font-size="9" fill="#374151">(fwd traffic)</text>
  <text x="730" y="365" text-anchor="middle" font-size="10" fill="#374151">peered</text>
  <text x="730" y="378" text-anchor="middle" font-size="9" fill="#374151">(fwd traffic)</text>

  <text x="500" y="365" text-anchor="middle" font-size="10" fill="#9ca3af">no direct spoke-to-spoke peering -</text>
  <text x="500" y="378" text-anchor="middle" font-size="10" fill="#9ca3af">all cross-spoke traffic transits the hub firewall</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Dev spoke -->
  <rect x="40" y="400" width="380" height="240" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="230" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#14532d">rg-securebicep-dev</text>
  <text x="230" y="446" text-anchor="middle" font-size="13" fill="#14532d">vnet-dev  10.1.0.0/16</text>

  <rect x="60" y="460" width="340" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="230" y="480" text-anchor="middle" font-size="12" fill="#14532d">snet-app</text>
  <text x="230" y="498" text-anchor="middle" font-size="11" fill="#166534">nsg-app + route 0.0.0.0/0 -&gt; firewall</text>

  <rect x="60" y="528" width="340" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="230" y="548" text-anchor="middle" font-size="12" fill="#14532d">snet-data</text>
  <text x="230" y="566" text-anchor="middle" font-size="11" fill="#166534">private endpoint -&gt; Storage account (GRS)</text>

  <text x="230" y="612" text-anchor="middle" font-size="10" font-style="italic" fill="#16a34a">bicep/spoke/main.bicep -params dev.bicepparam</text>
  <text x="230" y="628" text-anchor="middle" font-size="10" fill="#16a34a">Environment: dev (no approval)</text>

  <!-- Prod spoke -->
  <rect x="580" y="400" width="380" height="240" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="770" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#7f1d1d">rg-securebicep-prod</text>
  <text x="770" y="446" text-anchor="middle" font-size="13" fill="#7f1d1d">vnet-prod  10.2.0.0/16</text>

  <rect x="600" y="460" width="340" height="60" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="770" y="480" text-anchor="middle" font-size="12" fill="#7f1d1d">snet-app</text>
  <text x="770" y="498" text-anchor="middle" font-size="11" fill="#991b1b">nsg-app + route 0.0.0.0/0 -&gt; firewall</text>

  <rect x="600" y="528" width="340" height="60" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="770" y="548" text-anchor="middle" font-size="12" fill="#7f1d1d">snet-data</text>
  <text x="770" y="566" text-anchor="middle" font-size="11" fill="#991b1b">private endpoint -&gt; Storage account (GRS)</text>

  <text x="770" y="612" text-anchor="middle" font-size="10" font-style="italic" fill="#dc2626">bicep/spoke/main.bicep -params prod.bicepparam</text>
  <text x="770" y="628" text-anchor="middle" font-size="10" fill="#dc2626">Environment: prod (approval required)</text>
</svg>
