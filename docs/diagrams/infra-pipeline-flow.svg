<svg viewBox="0 0 1040 220" xmlns="http://www.w3.org/2000/svg" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="1040" height="220" fill="#ffffff"/>
  <text x="20" y="26" font-size="14" font-weight="bold" fill="#111827">azure-pipelines.yml  (root) - infra/ reference sample</text>

  <!-- boxes -->
  <g>
    <rect x="20" y="70" width="170" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="105" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Validate</text>
    <text x="105" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">bicep build</text>
  </g>

  <g>
    <rect x="230" y="70" width="190" height="70" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="325" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">SecurityGate</text>
    <text x="325" y="109" text-anchor="middle" font-size="10" fill="#713f12">Checkov</text>
    <text x="325" y="123" text-anchor="middle" font-size="10" fill="#713f12">PSRule.Rules.Azure</text>
  </g>

  <g>
    <rect x="460" y="70" width="160" height="70" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="540" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">DeployDev</text>
    <text x="540" y="109" text-anchor="middle" font-size="10" fill="#14532d">env: dev</text>
    <text x="540" y="123" text-anchor="middle" font-size="10" fill="#14532d">no approval</text>
  </g>

  <g>
    <rect x="660" y="70" width="160" height="70" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="740" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">DeployTest</text>
    <text x="740" y="109" text-anchor="middle" font-size="10" fill="#14532d">env: dev</text>
    <text x="740" y="123" text-anchor="middle" font-size="10" fill="#14532d">no approval</text>
  </g>

  <g>
    <rect x="860" y="70" width="160" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="940" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">DeployProd</text>
    <text x="940" y="105" text-anchor="middle" font-size="10" fill="#7f1d1d">env: prod</text>
    <text x="940" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">approval required</text>
  </g>

  <!-- arrows -->
  <g stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow2)">
    <line x1="190" y1="105" x2="228" y2="105"/>
    <line x1="420" y1="105" x2="458" y2="105"/>
    <line x1="620" y1="105" x2="658" y2="105"/>
    <line x1="820" y1="105" x2="858" y2="105"/>
  </g>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="20" y="175" font-size="11" fill="#4b5563">Deploys infra/main.bicep (subscription-scope: creates its own rg-securebicep-{env} + a locked-down storage account).</text>
  <text x="20" y="193" font-size="11" fill="#4b5563">Every stage depends on the previous one succeeding - a Checkov/PSRule failure stops the pipeline before anything deploys.</text>
</svg>
