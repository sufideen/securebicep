<svg viewBox="0 0 1040 220" xmlns="http://www.w3.org/2000/svg" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="1040" height="220" fill="#ffffff"/>
  <text x="20" y="26" font-size="14" font-weight="bold" fill="#111827">bicep/azure-pipelines.yml - hub-and-spoke reference architecture</text>

  <!-- boxes -->
  <g>
    <rect x="20" y="70" width="190" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="115" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">Validate</text>
    <text x="115" y="109" text-anchor="middle" font-size="10" fill="#1e3a8a">bicep build</text>
    <text x="115" y="123" text-anchor="middle" font-size="10" fill="#1e3a8a">bicep lint</text>
  </g>

  <g>
    <rect x="250" y="70" width="220" height="70" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="360" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">IaC_Compliance</text>
    <text x="360" y="109" text-anchor="middle" font-size="10" fill="#713f12">Checkov</text>
    <text x="360" y="123" text-anchor="middle" font-size="10" fill="#713f12">PSRule.Rules.Azure</text>
  </g>

  <g>
    <rect x="510" y="60" width="230" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="625" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">DeployDev</text>
    <text x="625" y="98" text-anchor="middle" font-size="10" fill="#14532d">hub network + dev spoke</text>
    <text x="625" y="113" text-anchor="middle" font-size="10" fill="#14532d">env: dev - no approval</text>
    <text x="625" y="128" text-anchor="middle" font-size="9" font-style="italic" fill="#166534">creates rg-securebicep-hub</text>
  </g>

  <g>
    <rect x="780" y="60" width="230" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="895" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">DeployProd</text>
    <text x="895" y="96" text-anchor="middle" font-size="10" fill="#7f1d1d">prod spoke, reuses hub</text>
    <text x="895" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">env: prod</text>
    <text x="895" y="127" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f1d1d">approval required</text>
  </g>

  <!-- arrows -->
  <g stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow3)">
    <line x1="210" y1="105" x2="248" y2="105"/>
    <line x1="470" y1="105" x2="508" y2="105"/>
    <line x1="740" y1="105" x2="778" y2="105"/>
  </g>
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="20" y="175" font-size="11" fill="#4b5563">Deploys bicep/hub + bicep/spoke via resource-group-scope az deployment group create.</text>
  <text x="20" y="193" font-size="11" fill="#4b5563">Not auto-detected when creating a pipeline - add manually: New pipeline &gt; Existing YAML file &gt; bicep/azure-pipelines.yml.</text>
</svg>
